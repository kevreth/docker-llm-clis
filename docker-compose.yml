services:
  docker-llm-cli:

    image: docker-llm-cli

    build:
      context: .
      dockerfile: ${DOCKERFILE:-Dockerfile}
      args:
        - NODE_IMAGE
        - YARN_VERSION
        - CLAUDE_VERSION
        - YARN_SCRIPT_VERSION
        - COPILOT_VERSION
        - KIMI_VERSION
        - MISTRAL_VERSION

    user: 1000:1000

    container_name: docker-llm-cli

    volumes:
      - ${WORKSPACE_DIR:?WORKSPACE_DIR must be set}:/workspace
      - docker-llm-cli-artifacts:/artifacts
      - docker-llm-cli-home:/home/llm
      - ${SSH_AUTH_SOCK}:/ssh-agent

    working_dir: /workspace

    environment:
      GH_TOKEN: ${GH_TOKEN}
      HOME: /home/llm
      SSH_AUTH_SOCK: /ssh-agent
      TMPDIR: /workspace/.tmp
      SHELL: /bin/bash
      GIT_SSH_COMMAND: ssh -o UserKnownHostsFile=/home/llm/.ssh/known_hosts -o IdentityAgent=/ssh-agent
      TERM: xterm-256color

    stdin_open: true
    tty: true
    init: true

    cap_drop:
      - ALL

    security_opt:
      - no-new-privileges:false

    cap_add:
    - SETUID
    - SETGID
    - NET_RAW
    - NET_ADMIN

    tmpfs:
      - /tmp
      - /run

volumes:
  docker-llm-cli-artifacts:
  docker-llm-cli-home:
