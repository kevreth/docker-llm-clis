user:
  llm:
    exists: true
    uid: 1000
    gid: 1000
    home: /home/llm
    groups:
      - sudo

file:
  /home/llm/.local/bin/claude:
    exists: true
    filetype: file
    mode: "0755"
  /home/llm/.local/bin/copilot:
    exists: true
    filetype: file
    mode: "0755"
  /home/llm/.local/bin/kimi:
    exists: true
    filetype: symlink
    mode: "0777"
  /home/llm/.local/bin/vibe:
    exists: true
    filetype: symlink
    mode: "0777"
  /opt/npm-global/bin/crush:
    exists: true
    filetype: symlink
    mode: "0777"
  /opt/npm-global/bin/codex:
    exists: true
    filetype: symlink
    mode: "0777"
  /opt/npm-global/bin/gemini:
    exists: true
    filetype: symlink
    mode: "0777"
  /opt/npm-global/bin/opencode:
    exists: true
    filetype: symlink
    mode: "0777"
  /workspace:
    exists: true
    filetype: directory
    mode: "0755"
  /artifacts:
    exists: true
    filetype: directory
    mode: "0755"
  /etc/motd:
    exists: true
    filetype: file
  /etc/profile.d/aliases.sh:
    exists: true
    filetype: file
  /usr/local/bin/entrypoint.sh:
    exists: true
    filetype: file
    mode: "0755"
  /opt/npm-global/lib/node_modules/@qwen-code/qwen-code/package.json:
    exists: true
    filetype: file
    contains:
      - '"version": "0.15.0"'
  /home/llm/.local/bin/goose:
    exists: true
    filetype: file
    mode: "0755"
  /home/llm/.local/bin/jq:
    exists: true
    filetype: file
    mode: "0755"
  /home/llm/.local/bin/factory-droid:
    exists: true
    filetype: file
    mode: "0755"

command:
  node --version:
    exit-status: 0
    stdout:
      - "/v24./"
  npm --version:
    exit-status: 0
  sh -c "yarn --version > /tmp/yarn_ver.txt && grep -q '4.14.1' /tmp/yarn_ver.txt":
    exit-status: 0
  python3 --version:
    exit-status: 0
  git --version:
    exit-status: 0
  sudo --version:
    exit-status: 0
  claude --version:
    exit-status: 0
    timeout: 30000
  codex --version:
    exit-status: 0
    timeout: 30000
  copilot --version:
    exit-status: 0
    timeout: 30000
  gemini --version:
    exit-status: 0
    timeout: 30000
  kimi --version:
    exit-status: 0
  vibe --version:
    exit-status: 0
    timeout: 30000
  crush --version:
    exit-status: 0
    timeout: 30000
  opencode --version:
    exit-status: 0
    timeout: 30000
  qwen --version:
    exit-status: 0
    stdout:
      - "/0\\.15\\.0/"
    timeout: 30000
  goose --version:
    exit-status: 0
    stdout:
      - "/1\\.31\\.1/"
    timeout: 30000
  jq --version:
    exit-status: 0
    stdout:
      - "/1\\.8\\.1/"
  factory-droid --version:
    exit-status: 0
    stdout:
      - "/0\\.106\\.0/"
    timeout: 30000
